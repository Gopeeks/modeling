<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2TZHJKDNQW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-2TZHJKDNQW');
  </script>
</head>
<body>

  <!-- NAV -->
  <nav id="nav">
    <div class="nav-name" id="nav-name"></div>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#portfolio">Portfolio</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#about">About</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <p class="hero-sub reveal" id="hero-tagline"></p>
      <h1 class="hero-name reveal" id="hero-name"></h1>
      <a class="hero-cta reveal" id="hero-cta" href="#portfolio">View Portfolio</a>
    </div>
    <div class="scroll-indicator"><span></span></div>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <div class="about-inner">
      <div class="about-image reveal">
        <img id="about-img" src="" alt="">
      </div>
      <div class="about-text reveal">
        <p class="section-label">About</p>
        <h2 id="about-heading"></h2>
        <p class="about-body" id="about-body"></p>
        <a class="btn-outline" id="about-cta" href="#contact"></a>
      </div>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section id="portfolio">
    <div class="portfolio-header reveal">
      <p class="section-label">Portfolio</p>
      <h2>Selected Work</h2>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lb-close">&times;</button>
    <button id="lb-prev">&#8592;</button>
    <button id="lb-next">&#8594;</button>
    <img id="lb-img" src="" alt="">
  </div>

  <!-- CONTACT -->
  <section id="contact">
    <div class="contact-inner reveal">
      <p class="section-label">Contact</p>
      <h2 id="contact-heading"></h2>
      <p class="contact-body" id="contact-body"></p>
      <a class="btn-primary" id="contact-email" href="#"></a>
      <div class="socials">
        <a id="social-instagram" href="#">Instagram</a>
        <span>/</span>
        <a id="social-linkedin" href="#">LinkedIn</a>
      </div>
    </div>
  </section>

  <footer>
    <p id="footer-text"></p>
  </footer>

  <!-- Cookie Banner -->
  <div id="cookie-banner">
    <p>This site uses cookies to analyse traffic via Google Analytics. No personal data is collected.</p>
    <button id="cookie-accept">Got it</button>
  </div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
