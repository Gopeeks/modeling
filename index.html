  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-2TZHJKDNQW"></script>
  <script>
    window.GA_MEASUREMENT_ID = 'G-2TZHJKDNQW';
    window.analyticsInitialized = false;
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    function disableAnalytics() {
      const id = window.GA_MEASUREMENT_ID;
      window[`ga-disable-${id}`] = true;
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        wait_for_update: 500,
      });
      gtag('consent', 'update', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
      });
    }

    function enableAnalytics() {
      const id = window.GA_MEASUREMENT_ID;
      window[`ga-disable-${id}`] = false;
      gtag('consent', 'update', {
        analytics_storage: 'granted',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
      });
      if (!window.analyticsInitialized) {
        gtag('config', id);
        window.analyticsInitialized = true;
      }
    }

    gtag('js', new Date());

    try {
      const cookieChoice = localStorage.getItem('cookieChoice');
      if (cookieChoice === 'accepted') enableAnalytics();
      else disableAnalytics();
    } catch (error) {
      disableAnalytics();
    }
  </script>

  <!-- PORTFOLIO -->

  <section id="experience">

      </div>
    </div>

  <footer>
    <p id="footer-location"></p>
    <p id="footer-text"></p>
  </footer>

  <!-- Cookie Notice -->
  <div id="cookie-notice">
    <h3>We use cookies</h3>
    <p>This site uses Google Analytics to understand how visitors engage with the portfolio. No personal data is stored or shared.</p>
    <div class="cookie-actions">
      <button id="cookie-accept" type="button" onclick="try{localStorage.setItem('cookieChoice','accepted')}catch(e){};this.closest('#cookie-notice').classList.add('hidden');if(window.setCookieChoice)window.setCookieChoice('accepted');">Accept</button>
      <button id="cookie-decline" type="button" onclick="try{localStorage.setItem('cookieChoice','declined')}catch(e){};this.closest('#cookie-notice').classList.add('hidden');if(window.setCookieChoice)window.setCookieChoice('declined');">Decline</button>
    </div>
  </div>
