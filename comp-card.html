<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gopika Nair — Comp Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #f8f6f1;
      --ink: #161616;
      --muted: #6f6a61;
      --line: rgba(22,22,22,0.12);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #d9d5cd;
      color: var(--ink);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }

    .print-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      border: none;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-sans);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.8rem 1.4rem;
      cursor: pointer;
      z-index: 100;
    }

    /* ── Shared sheet ── */
    .sheet {
      width: 8.5in;
      background: var(--paper);
      box-shadow: 0 24px 80px rgba(0,0,0,0.18);
    }

    /* ── Page 1: header + hero ── */
    .sheet-1 {
      height: 11in;
      padding: 0.55in 0.55in 0.5in;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0.26in;
    }

    /* ── Page 2: gallery + measurements ── */
    .sheet-2 {
      height: 11in;
      padding: 0.55in 0.55in 0.5in;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 0.26in;
    }

    /* ── Header ── */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 0.3in;
      padding-bottom: 0.18in;
      border-bottom: 1px solid var(--line);
    }

    .name-block h1 {
      font-family: var(--font-serif);
      font-size: 0.82in;
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: 0.02em;
    }

    .name-block p {
      margin-top: 0.16in;
      font-size: 0.11in;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-block {
      text-align: right;
      font-size: 0.115in;
      line-height: 1.55;
      color: var(--muted);
    }

    .contact-block a {
      color: inherit;
      text-decoration: none;
    }

    /* ── Hero photo (page 1) ── */
    .hero-photo {
      border: 1px solid var(--line);
      overflow: hidden;
      position: relative;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Gallery (page 2) ── */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 0.16in;
    }

    .gallery figure {
      padding: 0.045in;
      background: var(--paper);
      border: 1px solid var(--line);
      overflow: hidden;
      position: relative;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      background: #ece8e0;
    }

    /* ── Measurements ── */
    .measurements {
      border-top: 1px solid var(--line);
      padding-top: 0.22in;
      padding-bottom: 0.12in;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0.1in 0.18in;
      align-items: start;
    }

    .measurement {
      display: grid;
      gap: 0.02in;
    }

    .measurement-label {
      font-size: 0.09in;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .measurement-value {
      font-size: 0.17in;
      color: var(--ink);
    }

    /* ── Dev mode (mirrors gallery dev controls) ── */
    .dev-label {
      color: #c9a96e;
      font-family: monospace;
      font-size: 0.6rem;
      line-height: 1.35;
    }
    .dev-controls {
      position: absolute;
      left: 0; right: 0; top: 0;
      z-index: 11;
      display: grid;
      justify-items: end;
      gap: 0.35rem;
      padding: 0.45rem;
      pointer-events: none;
    }
    .dev-expand-btn {
      pointer-events: auto;
      appearance: none; -webkit-appearance: none;
      border: 1px solid rgba(201,169,110,0.38);
      background: rgba(8,8,8,0.82);
      color: #f5f0eb;
      font-family: var(--font-sans);
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.38rem 0.58rem;
      cursor: pointer;
    }
    .dev-controls-panel {
      pointer-events: auto;
      display: none;
      width: min(15rem, calc(100% - 0.9rem));
      gap: 0.35rem;
      padding: 0.45rem;
      background: rgba(0,0,0,0.76);
      backdrop-filter: blur(10px);
    }
    .dev-controls.is-expanded .dev-controls-panel { display: grid; }
    .dev-control { display: grid; gap: 0.2rem; }
    .dev-control span {
      color: rgba(245,240,235,0.72);
      font-size: 0.5rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .dev-crop-hint {
      color: rgba(245,240,235,0.58);
      font-size: 0.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .dev-select {
      width: 100%;
      appearance: none; -webkit-appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(17,17,17,0.92);
      color: #f5f0eb;
      font-family: var(--font-sans);
      font-size: 0.62rem;
      padding: 0.38rem 0.45rem;
    }
    .dev-save-btn,
    .dev-zoom-btn {
      appearance: none; -webkit-appearance: none;
      border: 1px solid rgba(201,169,110,0.38);
      background: rgba(201,169,110,0.12);
      color: #fff7ea;
      font-family: var(--font-sans);
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.45rem 0.62rem;
      cursor: pointer;
    }
    .dev-crop-toggle-btn {
      position: fixed;
      left: 1rem; bottom: 1rem;
      z-index: 300;
      appearance: none; -webkit-appearance: none;
      border: 1px solid rgba(201,169,110,0.35);
      background: rgba(8,8,8,0.88);
      color: #f5f0eb;
      font-family: var(--font-sans);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 0.58rem 0.85rem;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }
    .dev-crop-toggle-btn.active {
      background: rgba(201,169,110,0.16);
      border-color: rgba(201,169,110,0.72);
      color: #fff7ea;
    }
    .dev-save-status {
      position: fixed;
      right: 1rem; bottom: 1rem;
      z-index: 300;
      padding: 0.55rem 0.8rem;
      background: rgba(8,8,8,0.88);
      border: 1px solid rgba(201,169,110,0.32);
      color: #f5f0eb;
      font-family: var(--font-sans);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      pointer-events: none;
    }
    .dev-save-status.visible { opacity: 1; transform: translateY(0); }

    body.comp-crop-mode .hero-photo,
    body.comp-crop-mode .gallery figure { cursor: crosshair; }
    body.comp-crop-mode .hero-photo.crop-selected,
    body.comp-crop-mode .gallery figure.crop-selected { outline: 2px solid #c9a96e; cursor: crosshair; }
    body.comp-dragging,
    body.comp-dragging * { cursor: grabbing !important; }

    /* ── Zoom overlay ── */
    #comp-zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    #comp-zoom-overlay.visible { display: flex; }

    #comp-zoom-close {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: #fff;
      font-size: 2.2rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.4rem 0.6rem;
      opacity: 0.7;
    }

    #comp-zoom-close:hover { opacity: 1; }

    #comp-zoom-container {
      width: clamp(220px, 55vmin, 520px);
      background: #ece8e0;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    #comp-zoom-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: crosshair;
      user-select: none;
      -webkit-user-drag: none;
    }

    #comp-zoom-hint {
      color: rgba(255,255,255,0.55);
      font-family: var(--font-sans);
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── Responsive: tablet ── */
    @media screen and (max-width: 960px) {
      body { padding: 1.5rem; gap: 1.5rem; }
      .print-btn { top: 1rem; right: 1rem; }
      .sheet { width: min(8.5in, 100%); height: auto; }
      .sheet-1 { padding: 0.4in; grid-template-rows: auto auto; gap: 0.2in; }
      .sheet-2 { padding: 0.4in; grid-template-rows: auto auto; gap: 0.2in; }
      .hero-photo { aspect-ratio: 2/3; }
      .measurements { grid-template-columns: repeat(4, 1fr); }
    }

    /* ── Responsive: mobile ── */
    @media screen and (max-width: 600px) {
      body {
        padding: 0;
        gap: 0;
        background: #d9d5cd;
        justify-content: flex-start;
      }

      .print-btn { display: none; }

      .sheet {
        width: 100%;
        height: auto;
        box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      }

      .sheet-1 {
        padding: 1.5rem 1.25rem 1.5rem;
        grid-template-rows: auto auto;
        gap: 1.25rem;
      }

      .sheet-2 {
        padding: 1.5rem 1.25rem 2.5rem;
        grid-template-rows: auto auto;
        gap: 1.25rem;
        margin-top: 1rem;
      }

      .header {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 0.75rem;
        padding-bottom: 1rem;
      }

      .name-block h1 {
        font-size: clamp(2.8rem, 13vw, 4rem);
        line-height: 0.88;
      }

      .name-block p {
        margin-top: 0.5rem;
        font-size: 0.6rem;
        letter-spacing: 0.13em;
      }

      .contact-block {
        text-align: left;
        font-size: 0.75rem;
        line-height: 1.8;
      }

      .contact-block a {
        color: var(--ink);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .hero-photo {
        aspect-ratio: 3/4;
        height: auto;
      }

      .gallery {
        gap: 0.5rem;
      }

      .gallery img {
        aspect-ratio: 3/4;
      }

      .measurements {
        grid-template-columns: repeat(4, 1fr);
        padding-top: 1rem;
        padding-bottom: 0;
        gap: 0.75rem 0.5rem;
      }

      .measurement-label {
        font-size: 0.52rem;
        letter-spacing: 0.13em;
      }

      .measurement-value {
        font-size: 1rem;
      }
    }

    /* ── Print ── */
    @media print {
      body { background: #fff; padding: 0; min-height: auto; gap: 0; }
      .print-btn,
      #comp-crop-toggle-btn,
      #comp-save-btn,
      #comp-save-status,
      .comp-dev-label,
      .comp-photo-select,
      #comp-zoom-overlay { display: none !important; }
      .sheet { box-shadow: none; width: 8.5in; height: 11in; }
      .sheet-1 { page-break-after: always; }
      @page { size: 8.5in 11in; margin: 0; }
    }
  </style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">Print / Save PDF</button>

  <!-- PAGE 1: Header + Hero -->
  <main class="sheet sheet-1">
    <header class="header">
      <div class="name-block">
        <h1 id="comp-name"></h1>
        <p>New York City • Editorial • Commercial • Beauty • Lifestyle</p>
      </div>
      <div class="contact-block">
        <div><a id="comp-email" href="#"></a></div>
        <div><a id="comp-instagram" href="#"></a></div>
        <div>gopikanair.co</div>
      </div>
    </header>

    <section class="hero-photo" id="hero-photo">
      <img id="hero-img" src="" alt="">
    </section>
  </main>

  <!-- PAGE 2: Gallery + Measurements -->
  <main class="sheet sheet-2">
    <section class="gallery" id="comp-gallery"></section>

    <section class="measurements">
      <div class="measurement">
        <span class="measurement-label">Height</span>
        <span class="measurement-value" id="comp-height"></span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Bust</span>
        <span class="measurement-value" id="comp-bust"></span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Waist</span>
        <span class="measurement-value" id="comp-waist"></span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Hips</span>
        <span class="measurement-value" id="comp-hips"></span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Dress</span>
        <span class="measurement-value" id="comp-dress"></span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Shoe</span>
        <span class="measurement-value" id="comp-shoe"></span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Hair</span>
        <span class="measurement-value" id="comp-hair"></span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Eyes</span>
        <span class="measurement-value" id="comp-eyes"></span>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="comp-layout.js"></script>
  <script src="comp-card.js"></script>
</body>
</html>
