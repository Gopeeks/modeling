<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gopika Nair — Comp Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #d6d2cd;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
    }

    .print-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: #111;
      color: #fff;
      border: none;
      padding: 0.7rem 1.6rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 100;
    }
    .print-btn:hover { background: #444; }

    @media print {
      body { background: #fff; padding: 0; min-height: 0; display: block; }
      .print-btn { display: none; }
      .card { box-shadow: none; margin: 0; }
      @page { size: 8.5in 11in; margin: 0; }
    }

    /* ── Card */
    .card {
      width: 8.5in;
      height: 11in;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(0,0,0,0.22);
    }

    /* ── 4 photos in a row */
    .photos-row {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      background: #e8e8e8;
    }

    .photos-row img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photos-row img:nth-child(1) { object-position: center 8%;  }
    .photos-row img:nth-child(2) { object-position: center 16%; }
    .photos-row img:nth-child(3) { object-position: 44% 14%;    }
    .photos-row img:nth-child(4) { object-position: center 22%; }

    /* ── Info bar */
    .info-bar {
      flex-shrink: 0;
      height: 3.1in;
      display: grid;
      grid-template-columns: 1.6fr 2fr 1.3fr;
      gap: 0.5in;
      border-top: 1.5px solid #111;
      padding: 0.38in 0.52in 0.35in;
      align-items: start;
    }

    /* — Name */
    .name-col h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.3rem;
      font-weight: 300;
      line-height: 1.0;
      color: #0d0d0d;
      letter-spacing: 0.02em;
    }

    .name-col .city {
      font-size: 0.46rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #bbb;
      margin-top: 0.35rem;
      font-weight: 400;
      display: block;
    }

    .name-col .credit {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.78rem;
      color: #999;
      margin-top: 0.55in;
      display: block;
      line-height: 1.4;
    }

    .name-col .credit-sub {
      font-size: 0.42rem;
      letter-spacing: 0.06em;
      color: #ccc;
      display: block;
      margin-top: 0.1rem;
    }

    /* — Stats */
    .stats-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.22in 0.3in;
      align-content: start;
    }

    .stat-label {
      display: block;
      font-size: 0.4rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c0c0c0;
      margin-bottom: 0.05rem;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      color: #111;
      line-height: 1;
    }

    /* — Contact */
    .contact-col {
      display: flex;
      flex-direction: column;
      gap: 0.12in;
      text-align: right;
    }

    .contact-col a {
      font-size: 0.5rem;
      color: #555;
      text-decoration: none;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .contact-col .site {
      font-size: 0.42rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ccc;
      margin-top: 0.1in;
    }
  </style>
</head>
<body>

  <button class="print-btn" onclick="window.print()">Print / Save PDF</button>

  <div class="card">

    <!-- 4 photos across top -->
    <div class="photos-row">
      <img src="photos/comp/IMG_3475.jpg" alt="Gopika Nair">
      <img src="photos/comp/IMG_3483.jpg" alt="Gopika Nair">
      <img src="photos/comp/IMG_3477.jpg" alt="Gopika Nair">
      <img src="photos/comp/IMG_3470.jpg" alt="Gopika Nair">
    </div>

    <!-- Info strip -->
    <div class="info-bar">

      <!-- Name + credits -->
      <div class="name-col">
        <h1>Gopika<br>Nair</h1>
        <span class="city">New York City</span>
        <span class="credit">Bumble</span>
        <span class="credit-sub">NYC Subway &amp; Digital Campaign</span>
      </div>

      <!-- Measurements -->
      <div class="stats-col">
        <div>
          <span class="stat-label">Height</span>
          <span class="stat-value">5′9″</span>
        </div>
        <div>
          <span class="stat-label">Bust</span>
          <span class="stat-value">32″</span>
        </div>
        <div>
          <span class="stat-label">Waist</span>
          <span class="stat-value">27″</span>
        </div>
        <div>
          <span class="stat-label">Hips</span>
          <span class="stat-value">35″</span>
        </div>
        <div>
          <span class="stat-label">Dress</span>
          <span class="stat-value">S / 4</span>
        </div>
        <div>
          <span class="stat-label">Shoe</span>
          <span class="stat-value">8</span>
        </div>
        <div>
          <span class="stat-label">Hair</span>
          <span class="stat-value">Brown</span>
        </div>
        <div>
          <span class="stat-label">Eyes</span>
          <span class="stat-value">Brown</span>
        </div>
      </div>

      <!-- Contact -->
      <div class="contact-col">
        <a href="mailto:contact@gopikanair.co">contact@gopikanair.co</a>
        <a href="https://instagram.com/gopeeks">instagram.com/gopeeks</a>
        <span class="site">gopikanair.co</span>
      </div>

    </div>
  </div>

</body>
</html>
