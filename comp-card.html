<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gopika Nair — Comp Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #d6d2cd;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem;
    }

    /* ── Print button */
    .print-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: #111;
      color: #fff;
      border: none;
      padding: 0.7rem 1.6rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 100;
      transition: background 0.2s;
    }
    .print-btn:hover { background: #444; }

    @media print {
      body { background: #fff; padding: 0; min-height: 0; display: block; }
      .print-btn { display: none; }
      .card { box-shadow: none; margin: 0; }
      @page { size: 8.5in 11in; margin: 0; }
    }

    /* ══════════════════════════════════
       CARD  —  8.5 × 11 in, single page
    ══════════════════════════════════ */
    .card {
      width: 8.5in;
      height: 11in;
      background: #fff;
      display: grid;
      grid-template-columns: 58% 42%;
      overflow: hidden;
      box-shadow: 0 16px 60px rgba(0,0,0,0.22);
    }

    /* ── Left column: hero photo */
    .col-photo {
      position: relative;
      overflow: hidden;
    }

    .col-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 5%;
      display: block;
    }

    /* ── Right column: all info */
    .col-info {
      display: flex;
      flex-direction: column;
      padding: 0.58in 0.44in 0.42in 0.46in;
      border-left: 1px solid #e2e2e2;
    }

    /* — Name block */
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      line-height: 1.0;
      color: #0d0d0d;
      letter-spacing: 0.025em;
    }

    .location {
      margin-top: 0.4rem;
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #b0b0b0;
      font-weight: 400;
    }

    /* — Secondary photos */
    .secondary-photos {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin: 0.4in 0 0.36in;
      min-height: 0;
      overflow: hidden;
    }

    .secondary-photos img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* IMG_3483 — neutral front, zoom to face */
    .secondary-photos img:nth-child(1) { object-position: center 18%; }
    /* IMG_3477 — angled, zoom to face */
    .secondary-photos img:nth-child(2) { object-position: 45% 15%; }
    /* IMG_3470 — closer 3/4, already tighter crop */
    .secondary-photos img:nth-child(3) { object-position: center 17%; }

    /* — Stats */
    .stats-block {
      border-top: 1px solid #e8e8e8;
      padding-top: 0.28in;
      margin-bottom: 0.27in;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.19in 0.05in;
    }

    .stat-label {
      display: block;
      font-size: 0.41rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c0c0c0;
      margin-bottom: 0.06rem;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.08rem;
      font-weight: 400;
      color: #111;
      line-height: 1;
    }

    /* — Contact + credits */
    .contact-block {
      border-top: 1px solid #e8e8e8;
      padding-top: 0.22in;
      display: flex;
      flex-direction: column;
      gap: 0.13in;
    }

    .credits-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.82rem;
      font-style: italic;
      color: #777;
    }

    .credits-sub {
      font-size: 0.44rem;
      color: #c0c0c0;
      letter-spacing: 0.07em;
      display: block;
      margin-top: 0.05rem;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 0.07in;
      margin-top: 0.04in;
    }

    .contact-links a {
      font-size: 0.52rem;
      color: #555;
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .site-url {
      margin-top: 0.12in;
      font-size: 0.42rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #ccc;
    }
  </style>
</head>
<body>

  <button class="print-btn" onclick="window.print()">Print / Save PDF</button>

  <div class="card">

    <!-- Left: hero full-body photo -->
    <div class="col-photo">
      <img src="photos/comp/IMG_3475.jpg" alt="Gopika Nair">
    </div>

    <!-- Right: info panel -->
    <div class="col-info">

      <!-- Name -->
      <div>
        <h1 class="name">Gopika<br>Nair</h1>
        <p class="location">New York City</p>
      </div>

      <!-- Three secondary photos -->
      <div class="secondary-photos">
        <img src="photos/comp/IMG_3483.jpg" alt="Gopika Nair">
        <img src="photos/comp/IMG_3477.jpg" alt="Gopika Nair">
        <img src="photos/comp/IMG_3470.jpg" alt="Gopika Nair">
      </div>

      <!-- Stats -->
      <div class="stats-block">
        <div class="stats-grid">
          <div>
            <span class="stat-label">Height</span>
            <span class="stat-value">5′9″</span>
          </div>
          <div>
            <span class="stat-label">Bust</span>
            <span class="stat-value">32″</span>
          </div>
          <div>
            <span class="stat-label">Waist</span>
            <span class="stat-value">27″</span>
          </div>
          <div>
            <span class="stat-label">Hips</span>
            <span class="stat-value">35″</span>
          </div>
          <div>
            <span class="stat-label">Dress</span>
            <span class="stat-value">S / 4</span>
          </div>
          <div>
            <span class="stat-label">Shoe</span>
            <span class="stat-value">8</span>
          </div>
          <div>
            <span class="stat-label">Hair</span>
            <span class="stat-value">Brown</span>
          </div>
          <div>
            <span class="stat-label">Eyes</span>
            <span class="stat-value">Brown</span>
          </div>
        </div>
      </div>

      <!-- Credits + Contact -->
      <div class="contact-block">
        <div>
          <span class="credits-line">Bumble</span>
          <span class="credits-sub">NYC Subway &amp; Digital Campaign</span>
        </div>
        <div class="contact-links">
          <a href="mailto:contact@gopikanair.co">contact@gopikanair.co</a>
          <a href="https://instagram.com/gopeeks">instagram.com/gopeeks</a>
        </div>
        <p class="site-url">gopikanair.co</p>
      </div>

    </div>
  </div>

</body>
</html>
