<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gopika Nair — Comp Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #f8f6f1;
      --ink: #161616;
      --muted: #6f6a61;
      --line: rgba(22,22,22,0.12);
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #d9d5cd;
      color: var(--ink);
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .print-btn {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      border: none;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-sans);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.8rem 1.4rem;
      cursor: pointer;
    }

    .sheet {
      width: 8.5in;
      height: 11in;
      background: var(--paper);
      box-shadow: 0 24px 80px rgba(0,0,0,0.18);
      padding: 0.55in 0.55in 0.5in;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 0.26in;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 0.3in;
      padding-bottom: 0.18in;
      border-bottom: 1px solid var(--line);
    }

    .name-block h1 {
      font-family: var(--font-serif);
      font-size: 0.82in;
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: 0.02em;
    }

    .name-block p {
      margin-top: 0.16in;
      font-size: 0.11in;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .contact-block {
      text-align: right;
      font-size: 0.115in;
      line-height: 1.55;
      color: var(--muted);
    }

    .contact-block a {
      color: inherit;
      text-decoration: none;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      object-position: 57% 0%;
      display: block;
    }

    .hero-photo {
      border: 1px solid var(--line);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.16in;
      align-items: start;
    }

    .gallery figure {
      padding: 0.045in;
      background: var(--paper);
      border: 1px solid var(--line);
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      background: #ece8e0;
    }

    .gallery figure:nth-child(1) img { object-position: center 12%; }
    .gallery figure:nth-child(2) img { object-position: center 18%; }
    .gallery figure:nth-child(3) img { object-position: 44% 10%; }

    .measurements {
      border-top: 1px solid var(--line);
      padding-top: 0.22in;
      padding-bottom: 0.12in;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 0.1in 0.18in;
      align-items: start;
    }

    .measurement {
      display: grid;
      gap: 0.02in;
    }

    .measurement-label {
      font-size: 0.09in;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .measurement-value {
      font-size: 0.17in;
      color: var(--ink);
    }

    @media screen and (max-width: 900px) {
      body { padding: 1rem; }
      .print-btn { top: 1rem; right: 1rem; }
      .sheet {
        width: min(8.5in, 100%);
        height: auto;
      }
      .gallery,
      .measurements {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
        min-height: auto;
        display: block;
      }

      .print-btn { display: none; }

      .sheet {
        box-shadow: none;
        width: 8.5in;
        height: 11in;
      }

      @page {
        size: 8.5in 11in;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <button class="print-btn" onclick="window.print()">Print / Save PDF</button>

  <main class="sheet">
    <header class="header">
      <div class="name-block">
        <h1>Gopika Nair</h1>
        <p>New York City • Editorial • Commercial • Beauty • Lifestyle</p>
      </div>
      <div class="contact-block">
        <div><a href="mailto:contact@gopikanair.co">contact@gopikanair.co</a></div>
        <div><a href="https://instagram.com/gopeeks">instagram.com/gopeeks</a></div>
        <div>gopikanair.co</div>
      </div>
    </header>

    <section class="hero-photo">
      <img src="photos/PGN_6062.jpg" alt="Gopika Nair front-facing portrait">
    </section>

    <section class="gallery">
      <figure>
        <img src="photos/comp/IMG_3475.jpg" alt="Gopika Nair clean portrait pose">
      </figure>
      <figure>
        <img src="photos/comp/IMG_3483.jpg" alt="Gopika Nair three-quarter pose">
      </figure>
      <figure>
        <img src="photos/comp/IMG_3477.jpg" alt="Gopika Nair full-length pose">
      </figure>
    </section>

    <section class="measurements">
      <div class="measurement">
        <span class="measurement-label">Height</span>
        <span class="measurement-value">5'9"</span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Bust</span>
        <span class="measurement-value">32"</span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Waist</span>
        <span class="measurement-value">27"</span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Hips</span>
        <span class="measurement-value">35"</span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Dress</span>
        <span class="measurement-value">S / 4</span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Shoe</span>
        <span class="measurement-value">8</span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Hair</span>
        <span class="measurement-value">Brown</span>
      </div>
      <div class="measurement">
        <span class="measurement-label">Eyes</span>
        <span class="measurement-value">Brown</span>
      </div>
    </section>
  </main>
</body>
</html>
