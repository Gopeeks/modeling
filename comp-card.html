<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gopika Nair — Comp Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a96e;
      --black: #080808;
      --white: #f5f0eb;
      --muted: #888;
    }

    body {
      background: #fff;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
    }

    /* ── Print button (hidden on print) */
    .print-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--gold);
      color: var(--black);
      border: none;
      padding: 0.75rem 1.75rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      z-index: 10;
    }
    @media print { .print-btn { display: none; } }

    /* ── Card layout: A4 portrait */
    .card {
      width: 210mm;
      min-height: 297mm;
      margin: 2rem auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--black);
      color: var(--white);
      overflow: hidden;
    }

    @media print {
      body { margin: 0; }
      .card { margin: 0; width: 100%; min-height: 100vh; page-break-after: always; }
    }

    /* ── Left: main photo */
    .card-photo {
      position: relative;
      overflow: hidden;
    }
    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }

    /* ── Right: info */
    .card-info {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem 2.5rem;
      border-left: 1px solid rgba(201,169,110,0.2);
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      font-weight: 300;
      line-height: 1.1;
      color: var(--white);
    }
    .card-tagline {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 0.6rem;
    }

    /* Stats */
    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem 1rem;
      margin: 2.5rem 0;
    }
    .card-stat-label {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 0.2rem;
    }
    .card-stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--white);
    }

    /* Credits */
    .card-credits-title {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1rem;
    }
    .card-credit {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      font-style: italic;
      color: var(--white);
      margin-bottom: 0.3rem;
    }
    .card-credit-detail {
      font-size: 0.6rem;
      color: var(--muted);
      margin-bottom: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* Contact */
    .card-contact {
      border-top: 1px solid rgba(201,169,110,0.2);
      padding-top: 1.5rem;
    }
    .card-contact-label {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .card-contact a {
      display: block;
      font-size: 0.68rem;
      color: var(--white);
      text-decoration: none;
      margin-bottom: 0.3rem;
      letter-spacing: 0.05em;
    }

    /* ── Secondary photos strip (bottom row) */
    .card-photos {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      height: 220px;
      border-top: 1px solid rgba(201,169,110,0.15);
    }
    .card-photos img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      display: block;
    }
    .card-photos img:not(:last-child) {
      border-right: 1px solid rgba(201,169,110,0.15);
    }
  </style>
</head>
<body>

  <button class="print-btn" onclick="window.print()">Print / Save PDF</button>

  <div class="card">

    <!-- Main photo -->
    <div class="card-photo">
      <img src="photos/PGN_6062.jpg" alt="Gopika Nair">
    </div>

    <!-- Info panel -->
    <div class="card-info">
      <div>
        <h1 class="card-name">Gopika<br>Nair</h1>
        <p class="card-tagline">New York City</p>
      </div>

      <div class="card-stats">
        <div>
          <span class="card-stat-label">Height</span>
          <span class="card-stat-value">5'9"</span>
        </div>
        <div>
          <span class="card-stat-label">Bust</span>
          <span class="card-stat-value">32"</span>
        </div>
        <div>
          <span class="card-stat-label">Waist</span>
          <span class="card-stat-value">27"</span>
        </div>
        <div>
          <span class="card-stat-label">Hips</span>
          <span class="card-stat-value">35"</span>
        </div>
        <div>
          <span class="card-stat-label">Dress</span>
          <span class="card-stat-value">S</span>
        </div>
        <div>
          <span class="card-stat-label">Shoe</span>
          <span class="card-stat-value">8</span>
        </div>
        <div>
          <span class="card-stat-label">Hair</span>
          <span class="card-stat-value">Brown</span>
        </div>
        <div>
          <span class="card-stat-label">Eyes</span>
          <span class="card-stat-value">Brown</span>
        </div>
      </div>

      <div>
        <p class="card-credits-title">Credits</p>
        <p class="card-credit">Bumble (Acquired Brand Campaign)</p>
        <p class="card-credit-detail">NYC subway & digital ads</p>
      </div>

      <div class="card-contact">
        <p class="card-contact-label">Contact</p>
        <a href="mailto:gopiikanaiir@gmail.com">gopiikanaiir@gmail.com</a>
        <a href="https://instagram.com/gopeeks">instagram.com/gopeeks</a>
        <a href="https://gopeeks.github.io/modeling/">gopeeks.github.io/modeling</a>
      </div>
    </div>

    <!-- Secondary photos strip -->
    <div class="card-photos">
      <img src="photos/PGN_5948.jpg" alt="">
      <img src="photos/IMG_9255.jpg" alt="">
      <img src="photos/PGN_6353.jpg" alt="">
    </div>

  </div>

</body>
</html>
